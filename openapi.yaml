# FILE: backend/openapi.yaml
# UPDATED: Merged Homepage Phase schemas and paths into full configuration

openapi: 3.0.3
info:
  title: LoanFlow API
  description: |
    # LoanFlow - Fintech Loan Management Platform API
    
    This API provides endpoints for managing loans, users, repayments, 
    and system health monitoring.

    ## Foundation Phase Features
    - System health checks
    - API connectivity testing
    - Monitoring and diagnostics

    
    ## Homepage Phase Features
    - System health checks
    - API connectivity testing
    - Customer testimonials
    - Frequently Asked Questions
    - Loan products
    - Settings (hero, statistics, features)
    
    ## Upcoming Features
    - User authentication
    - Loan application processing
    - Repayment management
    - Admin dashboard
    
  version: 1.1.0
  contact:
    name: LoanFlow Support
    email: support@loanflow.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:5000
    description: Development Server
  - url: https://loanflow-backend-fprb.onrender.com
    description: Production Server

tags:
  - name: Health
    description: System health monitoring endpoints
  - name: Test
    description: API connectivity testing endpoints
  - name: Testimonials
    description: Customer testimonial management
  - name: FAQs
    description: Frequently asked questions
  - name: Loan Products
    description: Loan product management
  - name: Settings
    description: Application settings management

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [OK, ERROR]
          example: OK
          description: System health status
        timestamp:
          type: string
          format: date-time
          example: 2024-01-15T10:30:00.000Z
          description: Response timestamp
        uptime:
          type: number
          example: 123.45
          description: Server uptime in seconds
        uptimeFormatted:
          type: string
          example: 2m 3s
          description: Human-readable uptime
        mongoConnected:
          type: boolean
          example: true
          description: MongoDB connection status
        mongoState:
          type: integer
          enum: [0, 1, 2, 3, 99]
          example: 1
          description: MongoDB connection state
        mongoStateDescription:
          type: string
          enum: [Disconnected, Connected, Connecting, Disconnecting, Uninitialized]
          example: Connected
          description: Human-readable connection state
        environment:
          type: string
          enum: [development, staging, production]
          example: development
          description: Current environment
    
    TestResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
          description: Operation success status
        message:
          type: string
          example: API connection successful
          description: Status message
        data:
          type: object
          properties:
            backendStatus:
              type: string
              enum: [healthy, unhealthy]
              example: healthy
              description: Backend health status
            timestamp:
              type: string
              format: date-time
              example: 2024-01-15T10:30:00.000Z
              description: Response timestamp
            uptime:
              type: number
              example: 123.45
              description: Server uptime in seconds
            environment:
              type: string
              example: development
              description: Current environment
            apiVersion:
              type: string
              example: 1.0.0
              description: API version
    
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
          description: Operation success status
        message:
          type: string
          example: Route not found
          description: Error message
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                example: email
                description: Invalid field
              message:
                type: string
                example: Email is required
                description: Validation message
          description: Validation errors (if any)
        timestamp:
          type: string
          format: date-time
          example: 2024-01-15T10:30:00.000Z
          description: Error timestamp
        path:
          type: string
          example: /api/unknown
          description: Request path
        stack:
          type: string
          description: Stack trace (development only)
          
    Testimonial:
      type: object
      properties:
        _id:
          type: string
          example: 67a3b4c5d6e7f8g9h0i1j2k3
        customerName:
          type: string
          example: Chidi Okonkwo
        customerRole:
          type: string
          example: Small Business Owner
        content:
          type: string
          example: LoanFlow helped me expand my business...
        rating:
          type: integer
          minimum: 1
          maximum: 5
          example: 5
        avatarUrl:
          type: string
          nullable: true
        isActive:
          type: boolean
          default: true
        order:
          type: integer
          default: 0
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    
    FAQ:
      type: object
      properties:
        _id:
          type: string
        question:
          type: string
          example: What types of loans do you offer?
        answer:
          type: string
          example: We offer personal loans, business loans...
        category:
          type: string
          enum: [general, loans, repayment, account]
          example: general
        order:
          type: integer
          default: 0
        isActive:
          type: boolean
          default: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    
    LoanProduct:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
          example: Personal Loan
        description:
          type: string
          example: Quick funding for personal needs...
        minAmount:
          type: number
          example: 50000
        maxAmount:
          type: number
          example: 5000000
        interestRate:
          type: number
          example: 12
        processingFee:
          type: number
          example: 2.5
        repaymentPeriod:
          type: integer
          example: 12
        features:
          type: array
          items:
            type: string
          example: ["No collateral required", "Quick approval"]
        iconName:
          type: string
          example: UserIcon
        color:
          type: string
          enum: [blue, green, purple, orange, red]
          example: blue
        isActive:
          type: boolean
          default: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    
    Statistics:
      type: object
      properties:
        customers:
          type: string
          example: 10,000+
        disbursed:
          type: string
          example: ₦50 Billion
        approvalRate:
          type: string
          example: 98%
        processingTime:
          type: string
          example: 24-Hour
        customersLabel:
          type: string
          example: Happy Customers
        disbursedLabel:
          type: string
          example: Disbursed to Date
        approvalRateLabel:
          type: string
          example: Approval Rate
        processingTimeLabel:
          type: string
          example: Average Processing
    
    HeroContent:
      type: object
      properties:
        heading:
          type: string
          example: Get Fast, Flexible Loans When You Need Them Most
        subheading:
          type: string
          example: Apply in minutes, get approval within 24 hours...
        ctaText:
          type: string
          example: Apply Now
        ctaLink:
          type: string
          example: /auth/register
        secondaryCtaText:
          type: string
          example: Learn More
        secondaryCtaLink:
          type: string
          example: "#features"
        imageUrl:
          type: string
          nullable: true
        isActive:
          type: boolean
          default: true
    
    Feature:
      type: object
      properties:
        title:
          type: string
          example: Fast Approval
        description:
          type: string
          example: Get approved within 24 hours with our automated system
        icon:
          type: string
          example: RocketLaunchIcon
        color:
          type: string
          enum: [blue, green, purple, orange, red]
          example: blue

paths:
  /api/health:
    get:
      tags:
        - Health
      summary: System Health Check
      description: |
        Checks if the server is running and healthy.
        
        This endpoint is lightweight and fast, making it ideal for:
        - Monitoring services and load balancers
        - Frontend to verify backend availability
        - Quick system status checks
        
        The response includes MongoDB connection status to verify database connectivity.
      operationId: getHealth
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                success:
                  summary: Healthy server
                  value:
                    status: OK
                    timestamp: 2024-01-15T10:30:00.000Z
                    uptime: 123.45
                    uptimeFormatted: 2m 3s
                    mongoConnected: true
                    mongoState: 1
                    mongoStateDescription: Connected
                    environment: development
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                error:
                  summary: Server error
                  value:
                    success: false
                    message: Internal Server Error
                    timestamp: 2024-01-15T10:30:00.000Z
                    path: /api/health

  /api/test:
    get:
      tags:
        - Test
      summary: Test API Connection
      description: |
        Tests if the API is reachable and functioning properly.
        
        This endpoint is used for:
        - Frontend-backend connectivity testing
        - Verifying API is operational
        - Debugging connection issues
        
        It validates that no unexpected query parameters are sent as a security measure.
      operationId: testConnection
      parameters:
        - name: invalid
          in: query
          schema:
            type: string
          description: Invalid query parameter (will cause 400 error)
          deprecated: true
      responses:
        '200':
          description: API is reachable and working
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestResponse'
              examples:
                success:
                  summary: API is healthy
                  value:
                    success: true
                    message: API connection successful
                    data:
                      backendStatus: healthy
                      timestamp: 2024-01-15T10:30:00.000Z
                      uptime: 123.45
                      environment: development
                      apiVersion: 1.0.0
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidParam:
                  summary: Invalid query parameter
                  value:
                    success: false
                    message: Invalid query parameters
                    errors:
                      - field: invalid
                        message: "Unexpected query parameters: invalid"
                    timestamp: 2024-01-15T10:30:00.000Z
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                rateLimit:
                  summary: Too many requests
                  value:
                    success: false
                    message: Too many requests from this IP, please try again later.
                    timestamp: 2024-01-15T10:30:00.000Z
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /health:
    get:
      tags:
        - Health
      summary: Simple Health Check
      description: |
        Quick health check endpoint without API prefix.
        
        Returns minimal health information. Use `/api/health` for detailed status.
      operationId: simpleHealth
      responses:
        '200':
          description: Server is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: OK
                  timestamp:
                    type: string
                    format: date-time
                    example: 2024-01-15T10:30:00.000Z
                  environment:
                    type: string
                    example: development
                  uptime:
                    type: number
                    example: 123.45

  /api/testimonials:
    get:
      tags:
        - Testimonials
      summary: Get Testimonials
      description: Retrieves active customer testimonials with pagination
      operationId: getTestimonials
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 6
          description: Number of testimonials to return
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Page number for pagination
        - name: isActive
          in: query
          schema:
            type: boolean
            default: true
          description: Filter by active status
      responses:
        '200':
          description: Testimonials retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Testimonials retrieved successfully
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Testimonial'
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      total:
                        type: integer
                      pages:
                        type: integer
                  timestamp:
                    type: string
                    format: date-time
  
  /api/faqs:
    get:
      tags:
        - FAQs
      summary: Get FAQs
      description: Retrieves active frequently asked questions
      operationId: getFAQs
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
          description: Number of FAQs to return
        - name: category
          in: query
          schema:
            type: string
            enum: [general, loans, repayment, account]
          description: Filter by category
        - name: isActive
          in: query
          schema:
            type: boolean
            default: true
          description: Filter by active status
      responses:
        '200':
          description: FAQs retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: FAQs retrieved successfully
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/FAQ'
                  timestamp:
                    type: string
                    format: date-time
  
  /api/loan-products:
    get:
      tags:
        - Loan Products
      summary: Get Loan Products
      description: Retrieves active loan products
      operationId: getLoanProducts
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
          description: Number of products to return
        - name: isActive
          in: query
          schema:
            type: boolean
            default: true
          description: Filter by active status
      responses:
        '200':
          description: Loan products retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Loan products retrieved successfully
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/LoanProduct'
                  timestamp:
                    type: string
                    format: date-time
  
  /api/settings/statistics:
    get:
      tags:
        - Settings
      summary: Get Statistics
      description: Retrieves trust statistics for the homepage
      operationId: getStatistics
      responses:
        '200':
          description: Statistics retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Statistics retrieved successfully
                  data:
                    $ref: '#/components/schemas/Statistics'
                  timestamp:
                    type: string
                    format: date-time
  
  /api/settings/hero:
    get:
      tags:
        - Settings
      summary: Get Hero Content
      description: Retrieves hero section content for the homepage
      operationId: getHeroContent
      responses:
        '200':
          description: Hero content retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Hero content retrieved successfully
                  data:
                    $ref: '#/components/schemas/HeroContent'
                  timestamp:
                    type: string
                    format: date-time
  
  /api/settings/features:
    get:
      tags:
        - Settings
      summary: Get Features
      description: Retrieves feature cards for the homepage
      operationId: getFeatures
      responses:
        '200':
          description: Features retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Features retrieved successfully
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Feature'
                  timestamp:
                    type: string
                    format: date-time