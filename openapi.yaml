# FILE: backend/openapi.yaml

openapi: 3.0.3
info:
  title: LoanFlow API
  description: |
    # LoanFlow - Fintech Loan Management Platform API
    
    This API provides endpoints for managing loans, users, repayments, 
    and system health monitoring.

    ## Foundation Phase Features
    - System health checks
    - API connectivity testing
    - Monitoring and diagnostics

    ## Homepage Phase Features
    - Customer testimonials
    - Frequently Asked Questions
    - Loan products
    - Settings (hero, statistics, features)

    ## About Page Phase Features
    - Get and manage Team Members
    - Get and update About Page settings (Mission, Story, Values)
    
    ## Upcoming Features
    - User authentication
    - Loan application processing
    - Repayment management
    - Admin dashboard
    
  version: 1.3.0
  contact:
    name: LoanFlow Support
    email: support@loanflow.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:5000
    description: Development Server
  - url: https://loanflow-backend-fprb.onrender.com
    description: Production Server

tags:
  - name: Health
    description: System health monitoring endpoints
  - name: Test
    description: API connectivity testing endpoints
  - name: Testimonials
    description: Customer testimonial management
  - name: FAQs
    description: Frequently asked questions
  - name: Loan Products
    description: Loan product management
  - name: Settings
    description: Application settings management
  - name: Team
    description: Leadership team member details and management

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [OK, ERROR]
          example: OK
          description: System health status
        timestamp:
          type: string
          format: date-time
          example: 2024-01-15T10:30:00.000Z
          description: Response timestamp
        uptime:
          type: number
          example: 123.45
          description: Server uptime in seconds
        uptimeFormatted:
          type: string
          example: 2m 3s
          description: Human-readable uptime
        mongoConnected:
          type: boolean
          example: true
          description: MongoDB connection status
        mongoState:
          type: integer
          enum: [0, 1, 2, 3, 99]
          example: 1
          description: MongoDB connection state
        mongoStateDescription:
          type: string
          enum: [Disconnected, Connected, Connecting, Disconnecting, Uninitialized]
          example: Connected
          description: Human-readable connection state
        environment:
          type: string
          enum: [development, staging, production]
          example: development
          description: Current environment
    
    TestResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
          description: Operation success status
        message:
          type: string
          example: API connection successful
          description: Status message
        data:
          type: object
          properties:
            backendStatus:
              type: string
              enum: [healthy, unhealthy]
              example: healthy
              description: Backend health status
            timestamp:
              type: string
              format: date-time
              example: 2024-01-15T10:30:00.000Z
              description: Response timestamp
            uptime:
              type: number
              example: 123.45
              description: Server uptime in seconds
            environment:
              type: string
              example: development
              description: Current environment
            apiVersion:
              type: string
              example: 1.0.0
              description: API version
    
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
          description: Operation success status
        message:
          type: string
          example: Route not found
          description: Error message
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                example: email
                description: Invalid field
              message:
                type: string
                example: Email is required
                description: Validation message
          description: Validation errors (if any)
        timestamp:
          type: string
          format: date-time
          example: 2024-01-15T10:30:00.000Z
          description: Error timestamp
        path:
          type: string
          example: /api/unknown
          description: Request path
        stack:
          type: string
          description: Stack trace (development only)
          
    Testimonial:
      type: object
      properties:
        _id:
          type: string
          example: 67a3b4c5d6e7f8g9h0i1j2k3
        customerName:
          type: string
          example: Chidi Okonkwo
        customerRole:
          type: string
          example: Small Business Owner
        content:
          type: string
          example: LoanFlow helped me expand my business...
        rating:
          type: integer
          minimum: 1
          maximum: 5
          example: 5
        avatarUrl:
          type: string
          nullable: true
        isActive:
          type: boolean
          default: true
        order:
          type: integer
          default: 0
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    
    FAQ:
      type: object
      properties:
        _id:
          type: string
        question:
          type: string
          example: What types of loans do you offer?
        answer:
          type: string
          example: We offer personal loans, business loans...
        category:
          type: string
          enum: [general, loans, repayment, account]
          example: general
        order:
          type: integer
          default: 0
        isActive:
          type: boolean
          default: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    
    LoanProduct:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
          example: Personal Loan
        description:
          type: string
          example: Quick funding for personal needs...
        minAmount:
          type: number
          example: 50000
        maxAmount:
          type: number
          example: 5000000
        interestRate:
          type: number
          example: 12
        processingFee:
          type: number
          example: 2.5
        repaymentPeriod:
          type: integer
          example: 12
        features:
          type: array
          items:
            type: string
          example: ["No collateral required", "Quick approval"]
        iconName:
          type: string
          example: UserIcon
        color:
          type: string
          enum: [blue, green, purple, orange, red]
          example: blue
        isActive:
          type: boolean
          default: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    
    Statistics:
      type: object
      properties:
        customers:
          type: string
          example: 10,000+
        disbursed:
          type: string
          example: ₦50 Billion
        approvalRate:
          type: string
          example: 98%
        processingTime:
          type: string
          example: 24-Hour
        customersLabel:
          type: string
          example: Happy Customers
        disbursedLabel:
          type: string
          example: Disbursed to Date
        approvalRateLabel:
          type: string
          example: Approval Rate
        processingTimeLabel:
          type: string
          example: Average Processing
    
    HeroContent:
      type: object
      properties:
        heading:
          type: string
          example: Get Fast, Flexible Loans When You Need Them Most
        subheading:
          type: string
          example: Apply in minutes, get approval within 24 hours...
        ctaText:
          type: string
          example: Apply Now
        ctaLink:
          type: string
          example: /auth/register
        secondaryCtaText:
          type: string
          example: Learn More
        secondaryCtaLink:
          type: string
          example: "#features"
        imageUrl:
          type: string
          nullable: true
        isActive:
          type: boolean
          default: true
    
    Feature:
      type: object
      properties:
        title:
          type: string
          example: Fast Approval
        description:
          type: string
          example: Get approved within 24 hours with our automated system
        icon:
          type: string
          example: RocketLaunchIcon
        color:
          type: string
          enum: [blue, green, purple, orange, red]
          example: blue

    TeamMember:
      type: object
      properties:
        _id:
          type: string
          example: 67a3b4c5d6e7f8g9h0i1j2k9
        name:
          type: string
          example: Adedayo Williams
        role:
          type: string
          example: CEO & Co-Founder
        bio:
          type: string
          example: Adedayo has over 15 years of experience in fintech and banking...
        photoUrl:
          type: string
          nullable: true
        photoPublicId:
          type: string
          nullable: true
        order:
          type: integer
          default: 0
        isActive:
          type: boolean
          default: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AboutSettings:
      type: object
      properties:
        _id:
          type: string
        heroHeading:
          type: string
          example: Empowering Financial Freedom
        heroSubheading:
          type: string
          example: We're on a mission to make loans accessible...
        heroImageUrl:
          type: string
          nullable: true
        heroImagePublicId:
          type: string
          nullable: true
        storyTitle:
          type: string
          example: Our Story
        storyContent:
          type: string
          example: LoanFlow was founded in 2020...
        missionStatement:
          type: string
          example: To democratize access to affordable loans...
        values:
          type: array
          items:
            $ref: '#/components/schemas/Value'
        isActive:
          type: boolean
          default: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Value:
      type: object
      properties:
        title:
          type: string
          example: Accessibility
        description:
          type: string
          example: Making loans available to everyone...
        icon:
          type: string
          example: UserGroupIcon

paths:
  /api/health:
    get:
      tags:
        - Health
      summary: System Health Check
      description: Checks if the server is running and healthy.
      operationId: getHealth
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/test:
    get:
      tags:
        - Test
      summary: Test API Connection
      description: Tests if the API is reachable and functioning properly.
      operationId: testConnection
      parameters:
        - name: invalid
          in: query
          schema:
            type: string
          description: Invalid query parameter (will cause 400 error)
          deprecated: true
      responses:
        '200':
          description: API is reachable and working
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestResponse'
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /health:
    get:
      tags:
        - Health
      summary: Simple Health Check
      description: Quick health check endpoint without API prefix.
      operationId: simpleHealth
      responses:
        '200':
          description: Server is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: OK
                  timestamp:
                    type: string
                    format: date-time
                  environment:
                    type: string
                  uptime:
                    type: number

  /api/testimonials:
    get:
      tags:
        - Testimonials
      summary: Get Testimonials
      description: Retrieves active customer testimonials with pagination
      operationId: getTestimonials
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 6
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: isActive
          in: query
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: Testimonials retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Testimonial'
                  pagination:
                    type: object
                  timestamp:
                    type: string

  /api/faqs:
    get:
      tags:
        - FAQs
      summary: Get FAQs with Filters
      description: Retrieves FAQs with category filtering and search support
      operationId: getFAQs
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [general, loans, repayment, account]
          description: Filter by category
        - name: search
          in: query
          schema:
            type: string
          description: Search term for question text
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
          description: Number of FAQs to return
        - name: isActive
          in: query
          schema:
            type: boolean
            default: true
          description: Filter by active status
      responses:
        '200':
          description: FAQs retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: FAQs retrieved successfully
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/FAQ'
                  categories:
                    type: array
                    items:
                      type: string
                    example: ["general", "loans", "repayment", "account"]
                  filters:
                    type: object
                    properties:
                      category:
                        type: string
                        nullable: true
                      search:
                        type: string
                        nullable: true
                  timestamp:
                    type: string
                    format: date-time

  /api/faqs/categories:
    get:
      tags:
        - FAQs
      summary: Get FAQ Categories
      description: Retrieves distinct FAQ categories for filter pills
      operationId: getFAQCategories
      responses:
        '200':
          description: FAQ categories retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: FAQ categories retrieved successfully
                  data:
                    type: array
                    items:
                      type: string
                    example: ["general", "loans", "repayment", "account"]
                  timestamp:
                    type: string
                    format: date-time

  /api/loan-products:
    get:
      tags:
        - Loan Products
      summary: Get Loan Products with Filters
      description: Retrieves loan products with filtering, search, and pagination support
      operationId: getLoanProducts
      parameters:
        - name: type
          in: query
          schema:
            type: string
          description: Filter by product type
        - name: minAmount
          in: query
          schema:
            type: number
          description: Minimum loan amount
        - name: maxAmount
          in: query
          schema:
            type: number
          description: Maximum loan amount
        - name: duration
          in: query
          schema:
            type: integer
          description: Repayment period in months
        - name: search
          in: query
          schema:
            type: string
          description: Search term for name/description
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Page number
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
          description: Items per page
        - name: isActive
          in: query
          schema:
            type: boolean
            default: true
          description: Filter by active status
      responses:
        '200':
          description: Loan products retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Loan products retrieved successfully
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/LoanProduct'
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      total:
                        type: integer
                      pages:
                        type: integer
                  filters:
                    type: object
                    properties:
                      type:
                        type: string
                        nullable: true
                      minAmount:
                        type: number
                        nullable: true
                      maxAmount:
                        type: number
                        nullable: true
                      duration:
                        type: integer
                        nullable: true
                      search:
                        type: string
                        nullable: true
                  timestamp:
                    type: string
                    format: date-time

  /api/loan-products/types:
    get:
      tags:
        - Loan Products
      summary: Get Loan Product Types
      description: Retrieves distinct loan product types for filter dropdown
      operationId: getLoanProductTypes
      responses:
        '200':
          description: Loan product types retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Loan product types retrieved successfully
                  data:
                    type: array
                    items:
                      type: string
                    example: ["Personal Loan", "Business Loan", "Salary Advance", "Student Loan"]
                  timestamp:
                    type: string
                    format: date-time

  /api/settings/statistics:
    get:
      tags:
        - Settings
      summary: Get Statistics
      description: Retrieves trust statistics for the homepage
      operationId: getStatistics
      responses:
        '200':
          description: Statistics retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Statistics'
                  timestamp:
                    type: string

  /api/settings/hero:
    get:
      tags:
        - Settings
      summary: Get Hero Content
      description: Retrieves hero section content for the homepage
      operationId: getHeroContent
      responses:
        '200':
          description: Hero content retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/HeroContent'
                  timestamp:
                    type: string

  /api/settings/features:
    get:
      tags:
        - Settings
      summary: Get Features
      description: Retrieves feature cards for the homepage
      operationId: getFeatures
      responses:
        '200':
          description: Features retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Feature'
                  timestamp:
                    type: string

  /api/team:
    get:
      tags:
        - Team
      summary: Get Team Members
      description: Retrieves active team members
      operationId: getTeamMembers
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
          description: Number of team members to return
        - name: isActive
          in: query
          schema:
            type: boolean
            default: true
          description: Filter by active status
      responses:
        '200':
          description: Team members retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Team members retrieved successfully
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TeamMember'
                  timestamp:
                    type: string
                    format: date-time

  /api/team/{id}:
    get:
      tags:
        - Team
      summary: Get Single Team Member
      description: Retrieves a specific team member by ID
      operationId: getTeamMemberById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Team member ID
      responses:
        '200':
          description: Team member retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Team member retrieved successfully
                  data:
                    $ref: '#/components/schemas/TeamMember'
                  timestamp:
                    type: string
                    format: date-time
        '404':
          description: Team member not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Team member not found
                  timestamp:
                    type: string
                    format: date-time

  /api/settings/about:
    get:
      tags:
        - Settings
      summary: Get About Settings
      description: Retrieves about page settings
      operationId: getAboutSettings
      responses:
        '200':
          description: About settings retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: About settings retrieved successfully
                  data:
                    $ref: '#/components/schemas/AboutSettings'
                  timestamp:
                    type: string
                    format: date-time

    put:
      tags:
        - Settings
      summary: Update About Settings
      description: Updates about page settings
      operationId: updateAboutSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                heroHeading:
                  type: string
                heroSubheading:
                  type: string
                heroImageUrl:
                  type: string
                heroImagePublicId:
                  type: string
                storyTitle:
                  type: string
                storyContent:
                  type: string
                missionStatement:
                  type: string
                values:
                  type: array
                  items:
                    $ref: '#/components/schemas/Value'
      responses:
        '200':
          description: About settings updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: About settings updated successfully
                  data:
                    $ref: '#/components/schemas/AboutSettings'
                  timestamp:
                    type: string
                    format: date-time